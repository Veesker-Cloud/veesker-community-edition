name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: ubuntu-latest
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            gnome-keyring \
            libsecret-1-0 \
            libsecret-1-dev \
            dbus-x11

      - name: Setup keyring (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          eval "$(dbus-launch --sh-syntax)"
          eval "$(printf '\n' | gnome-keyring-daemon --unlock --components=secrets)"
          echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> "$GITHUB_ENV"
          echo "GNOME_KEYRING_CONTROL=$GNOME_KEYRING_CONTROL" >> "$GITHUB_ENV"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"

      - name: Setup keychain (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 build.keychain

      - name: Install JS deps (root)
        run: bun install --frozen-lockfile

      - name: Checkout @veesker/engine sibling (CE repo)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Veesker-Cloud/veesker-community-edition
          path: veesker-community-edition

      - name: Register @veesker/engine via bun link
        shell: bash
        run: |
          cd veesker-community-edition/engine
          bun install --frozen-lockfile
          bun link
          cd "$GITHUB_WORKSPACE/sidecar"
          bun link @veesker/engine

      - name: Install JS deps (sidecar)
        run: cd sidecar && bun install --frozen-lockfile

      - name: Type check
        run: bun run check

      - name: Check no pt-BR strings
        run: bun run check:no-ptbr

      - name: Frontend tests (Vitest)
        run: bun run test

      - name: Sidecar tests (Bun)
        run: cd sidecar && bun test

      - name: Compile sidecar binary (Windows)
        if: matrix.platform == 'windows-latest'
        run: cd sidecar && bun run build:win-x64

      - name: Compile sidecar binary (macOS arm64)
        if: matrix.platform == 'macos-latest'
        run: cd sidecar && bun run build:mac-arm64

      - name: Compile sidecar binary (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: cd sidecar && bun run build:linux-x64

      - name: Copy oracledb native bindings
        run: bun run copy-bindings

      - name: Rust tests (lib)
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

      - name: Build Tauri app
        if: startsWith(github.ref, 'refs/tags/')
        run: bun run tauri build
